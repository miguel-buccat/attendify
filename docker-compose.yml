services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: attendify-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - '${APP_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: attendify-queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    command: php artisan queue:work --tries=1 --timeout=0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: attendify-scheduler
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  vite:
    image: node:22-alpine
    container_name: attendify-vite
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node-modules:/var/www/html/node_modules
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173}"
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    container_name: attendify-postgres
    environment:
      POSTGRES_DB: '${DB_DATABASE:-attendify}'
      POSTGRES_USER: '${DB_USERNAME:-attendify}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-attendify} -d ${DB_DATABASE:-attendify}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: attendify-redis
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: attendify-mailpit
    ports:
      - '${FORWARD_MAILPIT_PORT_SMTP:-1025}:1025'
      - '${FORWARD_MAILPIT_PORT_HTTP:-8025}:8025'

volumes:
  pgsql-data:
  redis-data:
  node-modules:
